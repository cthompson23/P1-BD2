services:
  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
    - ./db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "4001:${BD_PORT}"
   
  db_keycloak:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER_KEYCLOAK}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_KEYCLOAK}
      POSTGRES_DB: ${POSTGRES_DB_KEYCLOAK}
    ports:
      - "5433:5432"
    
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db_keycloak
      KC_DB_URL_DATABASE: keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - db_keycloak
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - http.host=0.0.0.0
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:9200/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: api
    env_file:
      - .env.postgres
    depends_on:
      keycloak:
        condition: service_started
      db:
        condition: service_started
    ports:
      - "5001:${PORT}"
    command: ["node", "server.js"]

  search:
    build: .
    container_name: search
    env_file:
      - .env.postgres
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_ENDPOINT= ${ELASTICSEARCH_ENDPOINT}
      - ELASTICSEARCH_API_KEY=
    ports:
      - "5002:${PORT}"
    volumes:
      - .:/usr/local/app
    command: ["node", "elastic_search_service/server.js"]

  nginx:
    image: nginx:1.29.8
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - search  

volumes:
  esdata:
    driver: local


    
